<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="128" cy="128" r="120" fill="#FF0000" stroke="#CC0000" stroke-width="4"/>
  
  <!-- YouTube Play Button Background -->
  <rect x="64" y="88" width="128" height="80" rx="12" fill="#FFFFFF"/>
  
  <!-- Play Triangle -->
  <polygon points="108,108 108,148 148,128" fill="#FF0000"/>
  
  <!-- Manager Tools Icon -->
  <g transform="translate(180, 60)">
    <!-- Settings Gear -->
    <circle cx="20" cy="20" r="16" fill="#FFFFFF" stroke="#FF0000" stroke-width="2"/>
    <circle cx="20" cy="20" r="8" fill="#FF0000"/>
    <!-- Gear Teeth -->
    <rect x="18" y="4" width="4" height="8" fill="#FFFFFF"/>
    <rect x="18" y="28" width="4" height="8" fill="#FFFFFF"/>
    <rect x="4" y="18" width="8" height="4" fill="#FFFFFF"/>
    <rect x="28" y="18" width="8" height="4" fill="#FFFFFF"/>
  </g>
  
  <!-- Analytics Chart Icon -->
  <g transform="translate(60, 60)">
    <rect x="0" y="16" width="6" height="8" fill="#FFFFFF"/>
    <rect x="8" y="12" width="6" height="12" fill="#FFFFFF"/>
    <rect x="16" y="8" width="6" height="16" fill="#FFFFFF"/>
    <rect x="24" y="4" width="6" height="20" fill="#FFFFFF"/>
  </g>
  
  <!-- Upload Arrow -->
  <g transform="translate(180, 180)">
    <rect x="16" y="8" width="4" height="16" fill="#FFFFFF"/>
    <polygon points="12,12 18,4 24,12" fill="#FFFFFF"/>
    <rect x="8" y="20" width="16" height="4" fill="#FFFFFF"/>
  </g>
  
  <!-- YTM Text -->
  <text x="128" y="220" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#FFFFFF">YTM</text>
</svg>
